name: Bug report
description: Report a reproducible KubeAthrix defect
title: "bug: "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, tokens, Secret payloads, or undisclosed vulnerabilities.
  - type: input
    id: version
    attributes: {label: Version, placeholder: "0.2.0 and image/chart digest"}
    validations: {required: true}
  - type: input
    id: kubernetes
    attributes: {label: Kubernetes distribution and version}
    validations: {required: true}
  - type: textarea
    id: steps
    attributes: {label: Reproduction steps}
    validations: {required: true}
  - type: textarea
    id: expected
    attributes: {label: Expected behavior}
    validations: {required: true}
  - type: textarea
    id: actual
    attributes: {label: Actual behavior and sanitized logs}
    validations: {required: true}
