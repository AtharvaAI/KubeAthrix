name: Feature request
description: Propose a capability or improvement
title: "feat: "
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes: {label: Problem, description: Describe the operator problem, not only a proposed solution.}
    validations: {required: true}
  - type: textarea
    id: proposal
    attributes: {label: Proposed behavior}
    validations: {required: true}
  - type: textarea
    id: safety
    attributes: {label: Safety, permissions, compatibility, and rollback impact}
    validations: {required: true}
