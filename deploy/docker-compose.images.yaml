services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kubeathrix
      POSTGRES_USER: kubeathrix
      POSTGRES_PASSWORD: kubeathrix
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kubeathrix -d kubeathrix"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - kubeathrix-postgres:/var/lib/postgresql/data

  kubeathrix-api:
    # x-release-please-start-version
    image: docker.io/prashantdey/kubeathrix:${KUBEATHRIX_API_TAG:-api-0.2.0}
    # x-release-please-end
    environment:
      DATABASE_URL: postgres://kubeathrix:kubeathrix@postgres:5432/kubeathrix?sslmode=disable
      KUBEATHRIX_DEV_AUTH: "true"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  kubeathrix-console:
    # x-release-please-start-version
    image: docker.io/prashantdey/kubeathrix:${KUBEATHRIX_CONSOLE_TAG:-console-0.2.0}
    # x-release-please-end
    environment:
      KUBEATHRIX_API_UPSTREAM: http://kubeathrix-api:8080
    depends_on:
      - kubeathrix-api
    ports:
      - "5173:80"

volumes:
  kubeathrix-postgres:
