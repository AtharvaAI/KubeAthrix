apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubeathrix.fullname" . }}-api
  labels:
    {{- include "kubeathrix.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.api.port }}
      targetPort: http
  selector:
    {{- include "kubeathrix.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubeathrix.fullname" . }}-console
  labels:
    {{- include "kubeathrix.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.console.port }}
      targetPort: http
  selector:
    {{- include "kubeathrix.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: console
