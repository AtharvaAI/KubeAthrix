{{- if and (not .Values.postgres.external) (not .Values.postgres.existingSecret) }}
{{- $secretName := include "kubeathrix.postgresSecretName" . -}}
{{- $passwordKey := .Values.postgres.passwordKey -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $password := "" -}}
{{- if $existing -}}
{{- $password = (index $existing.data $passwordKey) | default "" -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "kubeathrix.labels" . | nindent 4 }}
type: Opaque
data:
  {{ $passwordKey }}: {{ if $password }}{{ $password | quote }}{{ else }}{{ randAlphaNum 32 | b64enc | quote }}{{ end }}
{{- end }}
