apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubeathrix.fullname" . }}-console
  labels:
    {{- include "kubeathrix.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount.console }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.deploymentStrategy.maxSurge }}
      maxUnavailable: {{ .Values.deploymentStrategy.maxUnavailable }}
  selector:
    matchLabels:
      {{- include "kubeathrix.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: console
  template:
    metadata:
      annotations:
        {{- if .Values.rollout.restartToken }}
        kubeathrix.io/restart-token: {{ .Values.rollout.restartToken | quote }}
        {{- end }}
        checksum/nginx-config: {{ include (print $.Template.BasePath "/console-nginx-config.yaml") . | sha256sum }}
      labels:
        {{- include "kubeathrix.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: console
    spec:
      serviceAccountName: {{ include "kubeathrix.fullname" . }}-console
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: console
          image: {{ if .Values.image.console.digest }}"{{ .Values.image.console.repository }}@{{ .Values.image.console.digest }}"{{ else }}"{{ .Values.image.console.repository }}:{{ .Values.image.console.tag }}"{{ end }}
          imagePullPolicy: {{ .Values.image.console.pullPolicy }}
          # The chart supplies a complete immutable ConfigMap configuration,
          # so bypass the image's envsubst entrypoint that would attempt to
          # rewrite the read-only default.conf mount.
          command: ["nginx"]
          args: ["-g", "daemon off;"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
          livenessProbe:
            httpGet:
              path: /
              port: http
          resources:
            {{- toYaml .Values.resources.console | nindent 12 }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "kubeathrix.fullname" . }}-console-nginx
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
