{{- if and (not .Values.auth.insecureDevelopmentMode) (not .Values.auth.oidc.enabled) -}}
{{- fail "secure authentication is required: configure auth.oidc or explicitly enable auth.insecureDevelopmentMode for an isolated demo" -}}
{{- end -}}
{{- if and (not .Values.auth.insecureDevelopmentMode) .Values.auth.oidc.enabled (or (empty .Values.auth.oidc.issuerURL) (empty .Values.auth.oidc.clientID)) -}}
{{- fail "auth.oidc.issuerURL and auth.oidc.clientID are required unless auth.insecureDevelopmentMode=true" -}}
{{- end -}}
{{- if and .Values.telemetry.tracing.enabled (empty .Values.telemetry.tracing.endpoint) -}}
{{- fail "telemetry.tracing.endpoint is required when OpenTelemetry tracing is enabled" -}}
{{- end -}}
{{- if and .Values.chaos.execution.enabled (empty .Values.chaos.namespaceAllowlist) -}}
{{- fail "chaos.namespaceAllowlist must contain at least one non-system namespace when chaos execution is enabled" -}}
{{- end -}}
{{- if and .Values.chaos.execution.enabled (not .Values.engines.chaosMesh.enabled) -}}
{{- fail "engines.chaosMesh.enabled must be true when chaos execution is enabled; install a compatible Chaos Mesh control plane first" -}}
{{- end -}}
{{- include "kubeathrix.validateManagedExternalResources" . -}}
{{- $ai := .Values.ai | default dict -}}
{{- $agent := $ai.agent | default dict -}}
{{- $notifications := .Values.notifications | default dict -}}
{{- $webhooks := $notifications.webhooks | default dict -}}
{{- $managedExternalResources := .Values.api.managedExternalResources | default dict -}}
{{- if and (default false $agent.enabled) (not (default false $ai.enabled)) -}}
{{- fail "ai.agent.enabled requires ai.enabled=true" -}}
{{- end -}}
{{- if and (default false $agent.enabled) (or (empty $ai.model) (empty $ai.existingSecret)) -}}
{{- fail "ai.agent.enabled requires ai.model and ai.existingSecret with the OpenAI API key" -}}
{{- end -}}
{{- if and (default false $ai.enabled) (hasPrefix "http://" (lower (default "https://api.openai.com/v1/chat/completions" $ai.endpoint))) (not (default false $ai.allowInsecureHTTP)) -}}
{{- fail "ai.endpoint must use HTTPS unless ai.allowInsecureHTTP=true for isolated local testing" -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubeathrix.fullname" . }}-api
  labels:
    {{- include "kubeathrix.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount.api }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.deploymentStrategy.maxSurge }}
      maxUnavailable: {{ .Values.deploymentStrategy.maxUnavailable }}
  selector:
    matchLabels:
      {{- include "kubeathrix.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      {{- if .Values.rollout.restartToken }}
      annotations:
        kubeathrix.io/restart-token: {{ .Values.rollout.restartToken | quote }}
      {{- end }}
      labels:
        {{- include "kubeathrix.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "kubeathrix.fullname" . }}-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: {{ if .Values.image.api.digest }}"{{ .Values.image.api.repository }}@{{ .Values.image.api.digest }}"{{ else }}"{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"{{ end }}
          imagePullPolicy: {{ .Values.image.api.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubeathrix.postgresSecretName" . }}
                  key: {{ .Values.postgres.passwordKey }}
            - name: DATABASE_URL
              value: {{ include "kubeathrix.databaseURL" . | quote }}
            - name: KUBEATHRIX_INSECURE_DEV_AUTH
              value: {{ .Values.auth.insecureDevelopmentMode | quote }}
            - name: KUBEATHRIX_CLUSTER_ID
              value: {{ .Values.api.clusterID | quote }}
            - name: KUBEATHRIX_MAX_REQUEST_BYTES
              value: {{ .Values.api.maxRequestBytes | quote }}
            - name: KUBEATHRIX_RATE_LIMIT_PER_MINUTE
              value: {{ .Values.api.rateLimitPerMinute | quote }}
            - name: KUBEATHRIX_FINDING_EXPIRY
              value: {{ .Values.api.findingExpiry | quote }}
            - name: KUBEATHRIX_OTEL_TRACING_ENABLED
              value: {{ .Values.telemetry.tracing.enabled | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.telemetry.tracing.endpoint | quote }}
            - name: KUBEATHRIX_OTEL_INSECURE
              value: {{ .Values.telemetry.tracing.insecure | quote }}
            - name: KUBEATHRIX_OTEL_SAMPLE_RATIO
              value: {{ .Values.telemetry.tracing.sampleRatio | quote }}
            - name: KUBEATHRIX_OTEL_EXPORT_TIMEOUT
              value: {{ .Values.telemetry.tracing.exportTimeout | quote }}
            {{- if .Values.telemetry.tracing.existingSecret }}
            - name: OTEL_EXPORTER_OTLP_HEADERS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.telemetry.tracing.existingSecret | quote }}
                  key: {{ .Values.telemetry.tracing.headersKey | quote }}
            {{- end }}
            - name: KUBEATHRIX_RISK_CONFIG_JSON
              value: {{ toJson .Values.api.riskConfig | quote }}
            - name: KUBEATHRIX_CLUSTER_INSPECTOR
              value: {{ .Values.api.clusterInspector.enabled | quote }}
            - name: KUBEATHRIX_ADAPTERS_ENABLED
              value: {{ .Values.api.adapters.enabled | quote }}
            - name: KUBEATHRIX_MANAGED_EXTERNAL_RESOURCES_ENABLED
              value: {{ default false $managedExternalResources.enabled | quote }}
            - name: KUBEATHRIX_MANAGED_EXTERNAL_RESOURCES_JSON
              value: {{ toJson $managedExternalResources | quote }}
            - name: KUBEATHRIX_AI_ENABLED
              value: {{ default false $ai.enabled | quote }}
            - name: KUBEATHRIX_AI_PROVIDER
              value: {{ default "openai-compatible" $ai.provider | quote }}
            - name: KUBEATHRIX_AI_ENDPOINT
              value: {{ default "https://api.openai.com/v1/chat/completions" $ai.endpoint | quote }}
            - name: KUBEATHRIX_AI_MODEL
              value: {{ default "" $ai.model | quote }}
            - name: KUBEATHRIX_AI_TIMEOUT
              value: {{ default "20s" $ai.timeout | quote }}
            - name: KUBEATHRIX_AI_ALLOW_INSECURE_HTTP
              value: {{ default false $ai.allowInsecureHTTP | quote }}
            - name: KUBEATHRIX_AI_ENDPOINT_HOST_ALLOWLIST
              value: {{ join "," ($ai.endpointHostAllowlist | default (list)) | quote }}
            - name: KUBEATHRIX_AI_EXCLUDED_SOURCES
              value: {{ join "," ($ai.excludedSources | default (list)) | quote }}
            - name: KUBEATHRIX_AI_EXCLUDED_NAMESPACES
              value: {{ join "," ($ai.excludedNamespaces | default (list)) | quote }}
            - name: KUBEATHRIX_AI_MAX_INPUT_BYTES
              value: {{ default 65536 $ai.maxInputBytes | quote }}
            - name: KUBEATHRIX_AI_MAX_OUTPUT_TOKENS
              value: {{ default 700 $ai.maxOutputTokens | quote }}
            - name: KUBEATHRIX_AI_CIRCUIT_BREAKER_THRESHOLD
              value: {{ default 3 $ai.circuitBreakerThreshold | quote }}
            - name: KUBEATHRIX_AI_CIRCUIT_BREAKER_COOLDOWN
              value: {{ default "30s" $ai.circuitBreakerCooldown | quote }}
            {{- if $ai.existingSecret }}
            - name: KUBEATHRIX_AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $ai.existingSecret | quote }}
                  key: {{ default "api-key" $ai.apiKeyKey | quote }}
            {{- end }}
            - name: KUBEATHRIX_AI_AGENT_ENABLED
              value: {{ default false $agent.enabled | quote }}
            - name: KUBEATHRIX_AI_AGENT_INTERVAL
              value: {{ default "1m" $agent.interval | quote }}
            - name: KUBEATHRIX_AI_AGENT_MIN_RISK_SCORE
              value: {{ default 60 $agent.minRiskScore | quote }}
            - name: KUBEATHRIX_AI_AGENT_MAX_FINDINGS_PER_CYCLE
              value: {{ default 10 $agent.maxFindingsPerCycle | quote }}
            - name: KUBEATHRIX_AI_AGENT_AUTO_PLAN
              value: {{ default true $agent.autoPlan | quote }}
            - name: KUBEATHRIX_AI_AGENT_AUTO_EXECUTE_TIER_A
              value: {{ default false $agent.autoExecuteTierA | quote }}
            - name: KUBEATHRIX_AI_AGENT_NOTIFICATION_TIMEOUT
              value: {{ default "5s" $agent.notificationTimeout | quote }}
            {{- if and (default false $webhooks.enabled) $webhooks.existingSecret }}
            - name: KUBEATHRIX_NOTIFICATION_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $webhooks.existingSecret | quote }}
                  key: {{ default "url" $webhooks.urlKey | quote }}
            {{- else }}
            - name: KUBEATHRIX_NOTIFICATION_WEBHOOK_URL
              value: {{ default "" $webhooks.url | quote }}
            {{- end }}
            - name: KUBEATHRIX_CHAOS_EXECUTION
              value: {{ .Values.chaos.execution.enabled | quote }}
            - name: KUBEATHRIX_CHAOS_NAMESPACE_ALLOWLIST
              value: {{ join "," .Values.chaos.namespaceAllowlist | quote }}
            - name: KUBEATHRIX_ENGINE_TRIVY_OPERATOR
              value: {{ .Values.engines.trivyOperator.enabled | quote }}
            - name: KUBEATHRIX_ENGINE_KYVERNO
              value: {{ .Values.engines.kyverno.enabled | quote }}
            - name: KUBEATHRIX_ENGINE_KUBESCAPE
              value: {{ .Values.engines.kubescape.enabled | quote }}
            - name: KUBEATHRIX_ENGINE_FALCO
              value: {{ .Values.engines.falco.enabled | quote }}
            - name: KUBEATHRIX_ENGINE_TETRAGON
              value: {{ .Values.engines.tetragon.enabled | quote }}
            - name: KUBEATHRIX_ENGINE_CHAOS_MESH
              value: {{ .Values.engines.chaosMesh.enabled | quote }}
            - name: KUBEATHRIX_ENGINE_LITMUS
              value: {{ .Values.engines.litmus.enabled | quote }}
            - name: OIDC_ISSUER_URL
              value: {{ .Values.auth.oidc.issuerURL | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.auth.oidc.clientID | quote }}
            {{- if .Values.auth.oidc.existingSecret }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.oidc.existingSecret }}
                  key: {{ .Values.auth.oidc.clientSecretKey }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
          resources:
            {{- toYaml .Values.resources.api | nindent 12 }}
