apiVersion: v1
kind: Pod
metadata:
  name: {{ include "kubeathrix.fullname" . }}-test-console
  labels:
    {{- include "kubeathrix.labels" . | nindent 4 }}
    app.kubernetes.io/component: chart-test
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    seccompProfile: {type: RuntimeDefault}
  containers:
    - name: wget
      image: busybox:1.37.0-musl@sha256:222ad6d973c0d198014546a65cd02c5fdedcc172123c5b4c2bf0af636550bd94
      command: ["sh", "-c"]
      args:
        - >-
          wget -q -O /dev/null http://{{ include "kubeathrix.fullname" . }}-console:{{ .Values.service.console.port }}/
          && wget -q -O - http://{{ include "kubeathrix.fullname" . }}-console:{{ .Values.service.console.port }}/auth/config
          | grep -q '"mode"'
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities: {drop: ["ALL"]}
      resources:
        requests: {cpu: 5m, memory: 8Mi}
        limits: {cpu: 50m, memory: 32Mi}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubeathrix.fullname" . }}-chart-test
  labels:
    {{- include "kubeathrix.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kubeathrix.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: chart-test
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels:
              {{- include "kubeathrix.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: console
      ports:
        - {protocol: TCP, port: 8080}
