{{- include "kubeathrix.validateManagedExternalResources" . -}}
{{- $managedExternalResources := .Values.api.managedExternalResources | default dict -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubeathrix.fullname" . }}-reader
  labels:
    {{- include "kubeathrix.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes", "namespaces", "pods", "services", "events", "serviceaccounts", "configmaps", "resourcequotas", "limitranges", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies", "ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["security.kubeathrix.io"]
    resources: ["exceptions"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["security.kubeathrix.io"]
    resources: ["findings", "remediationplans", "approvalrequests"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["security.kubeathrix.io"]
    resources: ["remediationruns"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["aquasecurity.github.io"]
    resources: ["vulnerabilityreports", "configauditreports", "exposedsecretreports", "rbacassessmentreports"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["wgpolicyk8s.io"]
    resources: ["policyreports", "clusterpolicyreports"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["openreports.io"]
    resources: ["reports", "clusterreports"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["spdx.softwarecomposition.kubescape.io"]
    resources: ["workloadconfigurationscansummaries", "vulnerabilitymanifestsummaries"]
    verbs: ["get", "list", "watch"]
  {{- if default false $managedExternalResources.enabled }}
  {{- range $entry := $managedExternalResources.allowlist }}
  - apiGroups: [{{ $entry.apiGroup | quote }}]
    resources:
      {{- range $resource := $entry.resources }}
      - {{ $resource | quote }}
      {{- end }}
    verbs: ["list"]
  {{- end }}
  {{- end }}
  {{- if .Values.chaos.execution.enabled }}
  - apiGroups: ["chaos-mesh.org"]
    resources: ["networkchaos", "stresschaos", "dnschaos"]
    verbs: ["get", "list", "watch", "create", "delete"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubeathrix.fullname" . }}-operator
  labels:
    {{- include "kubeathrix.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["resourcequotas", "limitranges"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch", "update"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["security.kubeathrix.io"]
    resources: ["findings", "remediationplans", "approvalrequests", "remediationruns", "exceptions"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["security.kubeathrix.io"]
    resources: ["findings/status", "remediationplans/status", "approvalrequests/status", "remediationruns/status", "exceptions/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["security.kubeathrix.io"]
    resources: ["findings/finalizers", "remediationplans/finalizers", "approvalrequests/finalizers", "remediationruns/finalizers", "exceptions/finalizers"]
    verbs: ["update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubeathrix.fullname" . }}-api-reader
  labels:
    {{- include "kubeathrix.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubeathrix.fullname" . }}-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "kubeathrix.fullname" . }}-api
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubeathrix.fullname" . }}-operator
  labels:
    {{- include "kubeathrix.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubeathrix.fullname" . }}-operator
subjects:
  - kind: ServiceAccount
    name: {{ include "kubeathrix.fullname" . }}-operator
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kubeathrix.fullname" . }}-rollback-snapshots
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeathrix.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kubeathrix.fullname" . }}-rollback-snapshots
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeathrix.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kubeathrix.fullname" . }}-rollback-snapshots
subjects:
  - kind: ServiceAccount
    name: {{ include "kubeathrix.fullname" . }}-operator
    namespace: {{ .Release.Namespace }}
