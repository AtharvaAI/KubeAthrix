apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubeathrix.fullname" . }}-console-nginx
  labels:
    {{- include "kubeathrix.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
      listen 80;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;

      location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://{{ include "kubeathrix.fullname" . }}-api:{{ .Values.service.api.port }}/api/;
      }

      location / {
        try_files $uri /index.html;
      }
    }
