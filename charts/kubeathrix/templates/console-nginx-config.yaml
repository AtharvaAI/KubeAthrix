apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubeathrix.fullname" . }}-console-nginx
  labels:
    {{- include "kubeathrix.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
      listen 8080;

      server_tokens off;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;

      location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://{{ include "kubeathrix.fullname" . }}-api:{{ .Values.service.api.port }}/api/;
      }

      location = /auth/config {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://{{ include "kubeathrix.fullname" . }}-api:{{ .Values.service.api.port }}/auth/config;
      }

      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "no-referrer" always;
      add_header X-Frame-Options "DENY" always;
      add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https:; img-src 'self' data:; style-src 'self'; script-src 'self'; frame-ancestors 'none'; base-uri 'none'; form-action 'self'" always;

      location / {
        try_files $uri /index.html;
      }
    }
