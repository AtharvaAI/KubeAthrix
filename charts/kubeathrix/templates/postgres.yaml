{{- if not .Values.postgres.external }}
{{- $postgresName := printf "%s-postgres" (include "kubeathrix.fullname" .) -}}
{{- $existingPostgres := lookup "apps/v1" "StatefulSet" .Release.Namespace $postgresName -}}
{{- $existingPostgresClaims := list -}}
{{- if and .Release.IsUpgrade $existingPostgres -}}
{{- $existingPostgresClaims = dig "spec" "volumeClaimTemplates" (list) $existingPostgres -}}
{{- end -}}
{{- $preservedPostgresClaims := list -}}
{{- range $claim := $existingPostgresClaims -}}
{{- $claimCopy := deepCopy $claim -}}
{{- $_ := unset $claimCopy "status" -}}
{{- if hasKey $claimCopy "metadata" -}}
{{- $_ := unset $claimCopy.metadata "creationTimestamp" -}}
{{- $_ := unset $claimCopy.metadata "resourceVersion" -}}
{{- $_ := unset $claimCopy.metadata "uid" -}}
{{- $_ := unset $claimCopy.metadata "managedFields" -}}
{{- end -}}
{{- $preservedPostgresClaims = append $preservedPostgresClaims $claimCopy -}}
{{- end -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ $postgresName }}
  labels:
    {{- include "kubeathrix.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: {{ .Values.postgres.port }}
      targetPort: postgres
  selector:
    {{- include "kubeathrix.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $postgresName }}
  labels:
    {{- include "kubeathrix.labels" . | nindent 4 }}
spec:
  serviceName: {{ $postgresName }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "kubeathrix.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "kubeathrix.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        fsGroup: {{ .Values.postgres.gid }}
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: postgres-permissions
          image: {{ .Values.postgres.image | quote }}
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - >-
              mkdir -p /var/lib/postgresql/data/pgdata /var/run/postgresql /tmp
              && chown -R {{ .Values.postgres.uid }}:{{ .Values.postgres.gid }} /var/lib/postgresql/data /var/run/postgresql /tmp
              && chmod 700 /var/lib/postgresql/data/pgdata
              && chmod 3775 /var/run/postgresql
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 0
            runAsGroup: 0
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: runtime
              mountPath: /var/run/postgresql
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.resources.postgres | nindent 12 }}
      containers:
        - name: postgres
          image: {{ .Values.postgres.image | quote }}
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: {{ .Values.postgres.uid }}
            runAsGroup: {{ .Values.postgres.gid }}
            capabilities:
              drop: ["ALL"]
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubeathrix.postgresSecretName" . }}
                  key: {{ .Values.postgres.passwordKey }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: runtime
              mountPath: /var/run/postgresql
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.username | quote }}, "-d", {{ .Values.postgres.database | quote }}]
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.username | quote }}, "-d", {{ .Values.postgres.database | quote }}]
          resources:
            {{- toYaml .Values.resources.postgres | nindent 12 }}
      volumes:
        - name: runtime
          emptyDir: {}
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
{{- if gt (len $preservedPostgresClaims) 0 }}
{{- toYaml $preservedPostgresClaims | nindent 4 }}
{{- else }}
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.postgres.storageClassName }}
        storageClassName: {{ .Values.postgres.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.storageSize }}
{{- end }}
{{- end }}
