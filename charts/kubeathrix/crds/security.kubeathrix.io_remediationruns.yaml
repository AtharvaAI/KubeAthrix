apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: remediationruns.security.kubeathrix.io
spec:
  group: security.kubeathrix.io
  scope: Namespaced
  names:
    plural: remediationruns
    singular: remediationrun
    kind: RemediationRun
    shortNames:
      - kxrun
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Plan
          type: string
          jsonPath: .spec.planRef.name
        - name: State
          type: string
          jsonPath: .status.state
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - planRef
              properties:
                planRef:
                  type: object
                  required: ["name"]
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
            status:
              type: object
              properties:
                state:
                  type: string
                  enum: ["pending_approval", "prepared", "approved", "execution_requested", "proposal_only", "dry_run_passed", "running", "verifying", "succeeded", "failed", "rollback_requested", "rolled_back"]
                actionStatuses:
                  type: array
                  items:
                    type: object
                    properties:
                      actionType:
                        type: string
                      state:
                        type: string
                      message:
                        type: string
                validationResult:
                  type: string
                rollbackMetadata:
                  type: string
                lastError:
                  type: string
                observedGeneration:
                  type: integer
                lastTransitionTime:
                  type: string
                  format: date-time
      subresources:
        status: {}
