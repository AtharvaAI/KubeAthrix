apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: exceptions.security.kubeathrix.io
spec:
  group: security.kubeathrix.io
  scope: Namespaced
  names:
    plural: exceptions
    singular: exception
    kind: Exception
    shortNames:
      - kxex
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Owner
          type: string
          jsonPath: .spec.owner
        - name: Expires
          type: date
          jsonPath: .spec.expiresAt
        - name: Phase
          type: string
          jsonPath: .status.phase
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - scope
                - owner
                - reason
                - expiresAt
              properties:
                scope:
                  type: string
                owner:
                  type: string
                reason:
                  type: string
                expiresAt:
                  type: string
                  format: date-time
                auditMetadata:
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
                lastTransitionTime:
                  type: string
                  format: date-time
      subresources:
        status: {}
