apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: approvalrequests.security.kubeathrix.io
spec:
  group: security.kubeathrix.io
  scope: Namespaced
  names:
    plural: approvalrequests
    singular: approvalrequest
    kind: ApprovalRequest
    shortNames:
      - kxapproval
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Subject
          type: string
          jsonPath: .spec.subjectRef
        - name: Requester
          type: string
          jsonPath: .spec.requester
        - name: Decision
          type: string
          jsonPath: .status.decision
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - subjectRef
                - requestedAction
                - requester
                - expiresAt
              properties:
                subjectRef:
                  type: string
                requestedAction:
                  type: string
                requester:
                  type: string
                expiresAt:
                  type: string
                  format: date-time
            status:
              type: object
              properties:
                decision:
                  type: string
                  enum: ["pending", "approved", "rejected", "expired"]
                approver:
                  type: string
                decisionReason:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
                lastTransitionTime:
                  type: string
                  format: date-time
      subresources:
        status: {}
