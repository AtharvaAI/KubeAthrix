replicaCount:
  api: 1
  console: 1
  operator: 1

deploymentStrategy:
  # Replace one pod at a time by default so upgrades fit small clusters that do
  # not have spare pod capacity for surge pods.
  maxSurge: 0
  maxUnavailable: 1

rollout:
  # Set to any new value to force a Deployment rollout when reusing mutable tags.
  restartToken: ""

image:
  api:
    repository: docker.io/prashantdey/kubeathrix
    # Stable releases publish this rolling alias after verification succeeds.
    tag: "api-latest"
    digest: ""
    pullPolicy: Always
  console:
    repository: docker.io/prashantdey/kubeathrix
    tag: "console-latest"
    digest: ""
    pullPolicy: Always
  operator:
    repository: docker.io/prashantdey/kubeathrix
    tag: "operator-latest"
    digest: ""
    pullPolicy: Always

service:
  type: ClusterIP
  api:
    port: 8080
  console:
    port: 80

api:
  clusterID: default
  maxRequestBytes: 1048576
  rateLimitPerMinute: 120
  # Open or in-review findings become expired when their newest evidence is
  # older than this duration. Fresh evidence reopens them automatically.
  findingExpiry: 24h
  clusterInspector:
    enabled: true
  adapters:
    enabled: true
  managedExternalResources:
    # Opt in only when Kubernetes custom resources are the authoritative
    # management surface for external resources. This never enables direct
    # cloud-provider API access.
    enabled: false
    # Every entry must name an exact non-core API group, version, and one or
    # more resource plurals. Wildcards are rejected during Helm rendering.
    # `namespaced` describes the CRD scope for discovery and authorization;
    # the generated ClusterRole remains read-only in either case.
    allowlist: []
    # - apiGroup: example.platform.io
    #   version: v1alpha1
    #   resources:
    #     - managedresources
    #   namespaced: true
  riskConfig:
    criticalBase: 90
    highBase: 72
    mediumBase: 50
    lowBase: 28
    infoBase: 10
    multiSourcePoints: 6
    correlatedPointsCap: 6
    networkPoints: 5
    identityPoints: 5
    imagePoints: 3
    multiResourcePointsCap: 5
    workloadWindowMinutes: 120
    imageWindowMinutes: 1440
    identityWindowMinutes: 60
    networkWindowMinutes: 120

telemetry:
  tracing:
    enabled: false
    # Full OTLP/HTTP base URL, for example https://otel.example.com:4318.
    endpoint: ""
    insecure: false
    sampleRatio: 0.1
    exportTimeout: 5s
    port: 4318
    # Optional Secret value containing standard OTLP headers such as
    # "Authorization=Bearer ...". It is never copied into chart values.
    existingSecret: ""
    headersKey: headers

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: kubeathrix.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

auth:
  # This bypass grants every request administrator access. Enable it only for
  # an isolated local demo and never expose such an install to a network.
  insecureDevelopmentMode: false
  oidc:
    enabled: true
    issuerURL: ""
    clientID: ""
    existingSecret: ""
    clientSecretKey: client-secret

postgres:
  external: false
  image: postgres:16.9-alpine@sha256:7c688148e5e156d0e86df7ba8ae5a05a2386aaec1e2ad8e6d11bdf10504b1fb7
  # The pinned Alpine Postgres image uses UID/GID 70 for the postgres user.
  uid: 70
  gid: 70
  # Empty uses the cluster's default StorageClass. External managed Postgres is
  # recommended for production.
  storageClassName: ""
  storageSize: 8Gi
  host: ""
  port: 5432
  database: kubeathrix
  username: kubeathrix
  existingSecret: ""
  passwordKey: password

modelProviders: []

ai:
  enabled: false
  provider: openai-compatible
  endpoint: https://api.openai.com/v1/chat/completions
  # HTTPS is required by default. Enable insecure HTTP only for an isolated
  # local test endpoint.
  allowInsecureHTTP: false
  # Optional exact DNS hostname allowlist for the provider endpoint. An empty
  # list permits the configured HTTPS hostname.
  endpointHostAllowlist: []
  # Findings matching either list are not sent to the model provider.
  excludedSources: []
  excludedNamespaces: []
  model: ""
  timeout: 20s
  maxInputBytes: 65536
  maxOutputTokens: 700
  circuitBreakerThreshold: 3
  circuitBreakerCooldown: 30s
  existingSecret: ""
  apiKeyKey: api-key
  agent:
    enabled: false
    interval: 1m
    minRiskScore: 60
    maxFindingsPerCycle: 10
    autoPlan: true
    # Requests execution only for non-approval Tier A typed actions. The
    # operator still performs server-side dry-run and honors remediation.mutationEnabled.
    autoExecuteTierA: false
    notificationTimeout: 5s

remediation:
  mutationEnabled: false
  mode: proposal-only
  requireApprovalFor:
    - network
    - iam
    - secret-rotation
    - admission-policy
  neverAutonomous:
    - destructive-delete
    - broad-admission-rollout
    - node-configuration

engines:
  trivyOperator:
    enabled: false
  kyverno:
    enabled: false
  kubescape:
    enabled: false
  falco:
    enabled: false
  tetragon:
    enabled: false
  chaosMesh:
    enabled: false
  litmus:
    enabled: false

chaos:
  # Execution also requires engines.chaosMesh.enabled, a reachable compatible
  # Chaos Mesh API, durable Postgres, and at least one exact non-system namespace.
  namespaceAllowlist: []
  execution:
    enabled: false

kyverno:
  crds:
    migration:
      enabled: false

notifications:
  webhooks:
    enabled: false
    url: ""
    existingSecret: ""
    urlKey: url
  alertmanager:
    enabled: false
    url: ""
  slack:
    enabled: false
    webhookSecretRef:
      name: ""
      key: url
  email:
    enabled: false
  teams:
    enabled: false
  telegram:
    enabled: false

resources:
  api:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  console:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi
  operator:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  postgres:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1
      memory: 1Gi

nodeSelector: {}
tolerations: []
affinity: {}
